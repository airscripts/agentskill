name: Test

on:
  workflow_call:

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - uses: actions/setup-python@v6
        name: Setup Python

        with:
          python-version: "3.10"

      - run: python -m pip install --upgrade pip
        name: Upgrade Pip

      - run: python -m pip install -e '.[dev]'
        name: Install Dependencies

      - run: pytest
        name: Run Tests
