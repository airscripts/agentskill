name: Test

on:
  workflow_call:

jobs:
  agentskill:
    name: Agentskill
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6

        with:
          python-version: "3.10"

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: pytest
